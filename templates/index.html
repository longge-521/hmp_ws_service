<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMP WS Service 全功能控制台</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2360a5fa'/%3E%3Cstop offset='100%25' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M8 12h16M8 16h16M8 20h16' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 Lucide 图标 -->
    <script src="/static/libs/lucide.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- 侧边栏导航 -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="layers" style="width: 20px; height: 20px;"></i>
                </div>
                <div class="logo-text">HMP WS Service</div>
            </div>
            <ul class="menu-list">
                <li class="menu-item active" onclick="switchPanel('ws')">
                    <i data-lucide="terminal" style="width: 18px; height: 18px;"></i>
                    WebSocket 调试
                </li>
                <li class="menu-item" onclick="switchPanel('messages')" id="menuMsg">
                    <i data-lucide="mail" style="width: 18px; height: 18px;"></i>
                    站内信系统
                    <span class="badge-count" id="unreadBadge">0</span>
                </li>
                <li class="menu-item" onclick="switchPanel('upload')">
                    <i data-lucide="upload-cloud" style="width: 18px; height: 18px;"></i>
                    大文件上传
                </li>
            </ul>
        </aside>

        <!-- 主体内容 -->
        <main class="content-area">
            <div class="panel-header">
                <h2 class="panel-title" id="currentPanelTitle">WebSocket 调试</h2>
                <div class="connection-status">
                    <div id="statusDot" class="status-dot"></div>
                    <span id="statusText">未连接</span>
                </div>
            </div>

            <!-- 面板 1：WebSocket 调试 -->
            <div id="panelWS" class="panel active">
                <div class="card form-row">
                    <div class="input-group">
                        <label for="clientIdInput">客户端 ID:</label>
                        <input type="text" id="clientIdInput" placeholder="输入客户端ID">
                    </div>
                    <button id="connectBtn" class="btn-primary">
                        <i data-lucide="link" style="width: 16px; height: 16px;"></i>
                        <span>连接服务</span>
                    </button>
                </div>

                <div id="chatArea" class="terminal">
                    <div class="log-entry log-system">系统就绪，输入客户端 ID 并点击“连接服务”开始调试</div>
                </div>

                <div class="card form-row">
                    <div class="input-group" style="flex: 1;">
                        <label for="messageInput">消息内容:</label>
                        <input type="text" id="messageInput" placeholder="输入内容，回车即发站内信..." disabled>
                    </div>
                    <button id="sendBtn" class="btn-primary" disabled>
                        <i data-lucide="send" style="width: 16px; height: 16px;"></i>
                        <span>发送站内信</span>
                    </button>
                </div>
            </div>

            <!-- 面板 2：站内信系统 -->
            <div id="panelMessages" class="panel">
                <div class="msg-grid">
                    <!-- 左侧：模拟发送表单 -->
                    <div class="card" style="display: flex; flex-direction: column; gap: 16px;">
                        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">模拟发送站内信 (进入 RabbitMQ 链路)</h3>
                        <div class="input-group">
                            <label for="mockSender">发送者 ID:</label>
                            <input type="text" id="mockSender" value="system">
                        </div>
                        <div class="input-group">
                            <label for="mockReceiver">接收者 ID:</label>
                            <input type="text" id="mockReceiver" placeholder="要发往的目标客户端ID">
                        </div>
                        <div class="input-group" style="align-items: flex-start;">
                            <label for="mockContent" style="margin-top: 8px;">消息内容:</label>
                            <textarea id="mockContent" rows="4" style="resize: none;" placeholder="输入站内信的内容..."></textarea>
                        </div>
                        <button onclick="sendMockMessage()" class="btn-primary" style="width: 100%;">
                            <i data-lucide="mail-plus" style="width: 16px; height: 16px;"></i>
                            <span>发布至 RabbitMQ</span>
                        </button>
                    </div>

                    <!-- 右侧：收件箱 -->
                    <div class="card" style="display: flex; flex-direction: column; gap: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3 style="font-size: 16px; font-weight: 600;">收件箱</h3>
                            <div style="display: flex; gap: 8px;">
                                <button onclick="markAllAsRead()" class="btn-secondary" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;">
                                    <i data-lucide="check-check" style="width: 12px; height: 12px;"></i>
                                    <span>一键已读</span>
                                </button>
                                <button onclick="loadMessages()" class="btn-secondary" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;">
                                    <i data-lucide="refresh-cw" style="width: 12px; height: 12px;"></i>
                                    <span>刷新</span>
                                </button>
                            </div>
                        </div>
                        <div class="msg-filter">
                            <button class="btn-primary" id="filterAll" onclick="filterMessages('all')" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;">全部</button>
                            <button class="btn-secondary" id="filterUnread" onclick="filterMessages('unread')" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;">未读</button>
                            <button class="btn-secondary" id="filterRead" onclick="filterMessages('read')" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;">已读</button>
                        </div>
                        <div class="msg-list" id="msgListArea">
                            <div class="log-entry log-system" style="text-align: center; margin-top: 40px;">WebSocket 连接后，会自动同步该客户端ID的站内信</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 面板 3：大文件上传 -->
            <div id="panelUpload" class="panel">
                <div class="card" style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                        <i data-lucide="upload-cloud" class="upload-icon"></i>
                        <div>
                            <p style="font-size: 16px; font-weight: 600;">拖拽大文件到此处 或 点击选择文件</p>
                            <p style="font-size: 13px; color: var(--text-muted); margin-top: 6px;">支持流式大文件传输，实时测速</p>
                        </div>
                        <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
                    </div>

                    <div class="progress-container" id="progressContainer">
                        <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 500;">
                            <span id="uploadFileName">filename.ext</span>
                            <span id="uploadPercent">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progressBarFill"></div>
                        </div>
                        <div class="progress-stats">
                            <span id="uploadSpeed">0 KB/s</span>
                            <span id="uploadEta">剩余时间: --:--</span>
                            <span id="uploadRatio">0 MB / 0 MB</span>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button id="cancelUploadBtn" onclick="abortUpload()" class="btn-danger" style="flex: 1; padding: 10px;">
                                <i data-lucide="x-circle" style="width: 16px; height: 16px;"></i>
                                <span>取消上传</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 新增：已上传文件列表卡片 -->
                <div class="card" style="margin-top: 20px; display: flex; flex-direction: column; gap: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="font-size: 16px; font-weight: 600;">已上传文件列表</h3>
                        <button onclick="loadUploadedFiles()" class="btn-secondary" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;">
                            <i data-lucide="refresh-cw" style="width: 12px; height: 12px;"></i>
                            <span>刷新列表</span>
                        </button>
                    </div>
                    <div class="table-container" style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--card-border); color: var(--text-muted);">
                                    <th style="padding: 10px 8px;">文件名称</th>
                                    <th style="padding: 10px 8px;">文件大小</th>
                                    <th style="padding: 10px 8px;">存储路径</th>
                                    <th style="padding: 10px 8px;">上传时间</th>
                                    <th style="padding: 10px 8px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="fileListBody">
                                <!-- 动态插入文件列表 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 弹窗容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 自定义确认弹窗 -->
    <div id="customConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 10000; animation: fadeIn 0.2s ease;">
        <div class="card" style="width: 90%; max-width: 400px; background: rgba(17, 24, 39, 0.95); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div style="display: flex; gap: 14px; align-items: flex-start;">
                <div style="background: rgba(59, 130, 246, 0.15); color: var(--primary); padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <i data-lucide="help-circle" style="width: 24px; height: 24px;"></i>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <h3 style="font-size: 16px; font-weight: 600; color: var(--text-main);">确认操作</h3>
                    <p id="customConfirmMessage" style="font-size: 14px; color: var(--text-muted); line-height: 1.5;"></p>
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="customConfirmCancelBtn" class="btn-secondary" style="padding: 8px 16px; font-size: 13px; border-radius: 8px;">取消</button>
                <button id="customConfirmOkBtn" class="btn-primary" style="padding: 8px 16px; font-size: 13px; border-radius: 8px;">确定</button>
            </div>
        </div>
    </div>

    <!-- 自定义警示弹窗 -->
    <div id="customAlertModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 10000; animation: fadeIn 0.2s ease;">
        <div class="card" style="width: 90%; max-width: 400px; background: rgba(17, 24, 39, 0.95); border: 1px solid var(--card-border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div style="display: flex; gap: 14px; align-items: flex-start;">
                <div id="customAlertIconContainer" style="background: rgba(239, 68, 68, 0.15); color: var(--danger); padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <i id="customAlertIcon" data-lucide="alert-triangle" style="width: 24px; height: 24px;"></i>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <h3 id="customAlertTitle" style="font-size: 16px; font-weight: 600; color: var(--text-main);">提示</h3>
                    <p id="customAlertMessage" style="font-size: 14px; color: var(--text-muted); line-height: 1.5; word-break: break-all;"></p>
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="customAlertOkBtn" class="btn-primary" style="padding: 8px 16px; font-size: 13px; border-radius: 8px;">我知道了</button>
            </div>
        </div>
    </div>

    <script src="/static/js/console.js?v=202606202052" defer></script>
</body>
</html>
